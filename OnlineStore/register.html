<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<header>

    <h1>Tech Store</h1>

</header>


<form>


    <fieldset>

        <legend>Personal Information</legend>


        <label>Full Name</label>
        <input type="text">


        <br>

        <label>Username</label>
        <input type="text">


        <br>

        <label>Password</label>
        <input type="password">


        <br>

        <label>Confirm Password</label>
        <input type="password">


    </fieldset>



    <fieldset>

        <legend>Contact Information</legend>


        <label>Email</label>
        <input type="email">


        <br>

        <label>Phone</label>
        <input type="tel">


        <br>

        <label>Date of Birth</label>
        <input type="date">
    </fieldset>
    <fieldset>

        <legend>Address Information</legend>


        <label>Gender</label>

        <input type="radio"> Male
        <input type="radio"> Female
        <br>
        <label>Country</label>


        <select>

            <option>Oman</option>
            <option>UAE</option>

        </select>
        <br>
        <textarea placeholder="Shipping Address"></textarea>


        <br>
        <input type="checkbox">

        Agree Terms

        <br>

        <button>
            Submit
        </button>
    </fieldset>
</form>

</body>
</html>
